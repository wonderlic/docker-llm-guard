services:
  llm-guard:
    image: ${LLM_GUARD_IMAGE:-llm-guard:latest}
    build:
      context: .
      args:
        LLM_GUARD_API_IMAGE: ${LLM_GUARD_API_IMAGE:-laiyer/llm-guard-api:latest}
        PRELOAD_MODELS: ${PRELOAD_MODELS:-true}
        RUN_OFFLINE: ${RUN_OFFLINE:-false}
    ports:
      - "7800:8000"
    env_file:
      - .env

