services:
  llm-guard:
    image: ${LLM_GUARD_IMAGE:-llm-guard:latest}
    build:
      context: .
      args:
        LLM_GUARD_API_IMAGE: ${LLM_GUARD_API_IMAGE:-laiyer/llm-guard-api:latest}
        PRELOAD_MODELS: ${PRELOAD_MODELS:-true}
        RUN_OFFLINE: ${RUN_OFFLINE:-false}
    ports:
      - "7800:8000"
    environment:
      APP_NAME: ${APP_NAME:-Detailed LLM Guard API}
      APP_PORT: 8000
      APP_WORKERS: ${APP_WORKERS:-1}
      AUTH_TOKEN: ${AUTH_TOKEN:?AUTH_TOKEN is required}
      HF_DATASETS_OFFLINE: ${HF_DATASETS_OFFLINE:-false}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-false}
      OTEL_EXPORTER_OTLP_TRACES_HEADERS: ${OTEL_EXPORTER_OTLP_TRACES_HEADERS:-x-project-name=llm-guard}
      PHOENIX_API_KEY: ${PHOENIX_API_KEY:-}
      PHOENIX_API_VERSION: ${PHOENIX_API_VERSION:-}
      PHOENIX_SPACE_ID: ${PHOENIX_SPACE_ID:-}
      PHOENIX_TRACING_COLLECTOR_ENDPOINT: ${PHOENIX_TRACING_COLLECTOR_ENDPOINT:-}
      PHOENIX_TRACING_PROJECT_NAME: ${PHOENIX_TRACING_PROJECT_NAME:-}
      SCANNER_CACHE_TTL_SECONDS: ${SCANNER_CACHE_TTL_SECONDS:-172800}
      TRACE_HEADER_DEBUG: ${TRACE_HEADER_DEBUG:-false}
      TRACING_EXPORTER: ${TRACING_EXPORTER:-otel_http}
      TRACING_OTEL_ENDPOINT: ${TRACING_OTEL_ENDPOINT:-http://phoenix:6006/v1/traces}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-false}
