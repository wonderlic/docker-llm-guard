receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  prometheusremotewrite/logzio:
    endpoint: ${env:LOGZIO_METRICS_ENDPOINT}
    headers:
      Authorization: Bearer ${env:LOGZIO_METRICS_TOKEN}
    add_metric_suffixes: false

  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - prometheusremotewrite/logzio
        - debug

  telemetry:
    logs:
      level: info
